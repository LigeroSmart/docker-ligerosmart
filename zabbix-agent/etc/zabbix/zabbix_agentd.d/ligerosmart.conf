UserParameter=ligerosmart.count_mail_queue[*],/usr/local/bin/zbx-mariadb.sh 'SELECT count(*) FROM mail_queue'
UserParameter=ligerosmart.count_mail_queue_old[*],/usr/local/bin/zbx-mariadb.sh 'SELECT count(*) FROM mail_queue WHERE create_time <= DATE_SUB(NOW(), INTERVAL 3 HOUR);'
UserParameter=ligerosmart.count_users[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) FROM users WHERE valid_id=1 AND login NOT LIKE '%@complemento.net.br' AND login NOT LIKE '%@ligerosmart.com' AND login NOT LIKE '%@localhost' AND id NOT IN (SELECT user_id FROM user_preferences WHERE preferences_key='UserEmail' AND preferences_value LIKE '%@complemento.net.br' OR preferences_value LIKE '%@ligerosmart.com' OR preferences_value LIKE '%@localhost')"
UserParameter=ligerosmart.list_users[*],/usr/local/bin/zbx-mariadb.sh "SELECT login FROM users WHERE valid_id=1 AND login NOT LIKE '%@complemento.net.br' AND login NOT LIKE '%@ligerosmart.com' AND login NOT LIKE '%@localhost' AND id NOT IN (SELECT user_id FROM user_preferences WHERE preferences_key='UserEmail' AND preferences_value LIKE '%@complemento.net.br' OR preferences_value LIKE '%@ligerosmart.com' OR preferences_value LIKE '%@localhost')"
UserParameter=ligerosmart.count_sessions_users[*],/usr/local/bin/zbx-mariadb.sh "SELECT DISTINCT count(session_id)  FROM sessions WHERE data_key = 'UserType' AND data_value = 'User'"
UserParameter=ligerosmart.count_sessions_customers[*],/usr/local/bin/zbx-mariadb.sh "SELECT DISTINCT count(session_id)  FROM sessions WHERE data_key = 'UserType' AND data_value = 'Customer'"
UserParameter=ligerosmart.count_scheduler_task[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) FROM scheduler_task"
UserParameter=ligerosmart.count_scheduler_task_old[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) FROM scheduler_task WHERE create_time <= DATE_SUB(NOW(), INTERVAL 3 HOUR);"
UserParameter=ligerosmart.count_ticket_history_top1[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) from ticket_history WHERE  create_time <= DATE_SUB(NOW(), INTERVAL 10 DAY) GROUP BY ticket_id LIMIT 1"
UserParameter=ligerosmart.count_process_id[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) from process_id"
UserParameter=ligerosmart.count_process_id_old[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) from process_id WHERE  FROM_UNIXTIME(process_create) <= DATE_SUB(NOW(), INTERVAL 1 DAY)"
UserParameter=ligerosmart.clean_scheduler_task[*],/usr/local/bin/zbx-mariadb.sh "DELETE FROM scheduler_task WHERE create_time <= DATE_SUB(NOW(), INTERVAL 20 MINUTE)"
UserParameter=ligerosmart.clean_process_id[*],/usr/local/bin/zbx-mariadb.sh "DELETE FROM process_id WHERE FROM_UNIXTIME(process_create) <= DATE_SUB(NOW(), INTERVAL 20 MINUTE)"
UserParameter=ligerosmart.count_ticket_open[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(ticket.id) FROM ticket JOIN ticket_state ON (ticket_state.id=ticket.ticket_state_id) JOIN ticket_state_type ON (ticket_state.type_id=ticket_state_type.id) WHERE ticket_state_type.name IN ('new','open','pending auto', 'pending reminder')"
UserParameter=ligerosmart.count_table[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) FROM $1"
UserParameter=ligerosmart.sysconfig_modified_option_is_valid[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) FROM sysconfig_modified WHERE name='$1' AND is_valid=1"
UserParameter=ligerosmart.sysconfig_modified_option_is_valid_effective[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) FROM sysconfig_modified WHERE name='$1' AND is_valid=1 AND effective_value LIKE \"--- '1'%\""
UserParameter=ligerosmart.sysconfig_modified_value[*],/usr/local/bin/zbx-mariadb.sh "SELECT effective_value FROM sysconfig_modified WHERE name='$1'"
UserParameter=ligerosmart.desc_value_table[*],/usr/local/bin/zbx-mariadb.sh "SELECT $2 FROM $1 ORDER BY $2 DESC LIMIT 1"
UserParameter=ligerosmart.last_change_value_table[*],/usr/local/bin/zbx-mariadb.sh "SELECT $2 FROM $1 ORDER BY change_time DESC LIMIT 1"
UserParameter=ligerosmart.count_ticket_archived[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(*) FROM ticket WHERE archive_flag=1"
UserParameter=ligerosmart.count_article_data_mime_duplicated[*],/usr/local/bin/zbx-mariadb.sh "SELECT count(a_message_id_md5) FROM article_data_mime adm JOIN article a ON (adm.article_id=a.id) JOIN ticket t ON (a.ticket_id=t.id) JOIN ticket_state ts ON (t.ticket_state_id=ts.id) JOIN ticket_state_type tst ON (ts.type_id=tst.id) WHERE tst.name <> 'closed' AND adm.create_time >= DATE_SUB(NOW(), INTERVAL 7 DAY) GROUP BY a_message_id_md5,t.tn LIMIT 1"
UserParameter=ligerosmart.ticket_article_data_mime_duplicated[*],/usr/local/bin/zbx-mariadb.sh "SELECT GROUP_CONCAT(DISTINCT t.tn) as tickets, a_message_id_md5 FROM article_data_mime adm JOIN article a ON (adm.article_id=a.id) JOIN ticket t ON (a.ticket_id=t.id) JOIN ticket_state ts ON (t.ticket_state_id=ts.id) JOIN ticket_state_type tst ON (ts.type_id=tst.id) WHERE tst.name <> 'closed' AND adm.create_time >= DATE_SUB(NOW(), INTERVAL 7 DAY) GROUP BY a_message_id_md5,t.tn HAVING count(a_message_id_md5) > 1 LIMIT 1"
